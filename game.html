<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Runner 3D - Flying Adventure</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #1a1a1a;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100vh;
        }

        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            color: white;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        #stats {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
            z-index: 100;
        }

        #score, #highScore, #multiplier {
            margin: 10px 0;
        }

        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            z-index: 200;
            display: none;
            pointer-events: auto;
            min-width: 300px;
        }

        #gameOver h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #ff6b6b;
        }

        #gameOver p {
            font-size: 24px;
            margin: 10px 0;
        }

        #gameOver button {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 20px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.3s;
        }

        #gameOver button:hover {
            background: #45a049;
        }

        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 14px;
            opacity: 0.7;
        }

        #powerUpInfo {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 18px;
            min-width: 200px;
            text-align: right;
        }

        .power-up-active {
            color: #FFD700;
            animation: pulse 0.5s infinite alternate;
        }

        @keyframes pulse {
            from { opacity: 1; }
            to { opacity: 0.6; }
        }

        @media (max-width: 768px) {
            #stats {
                font-size: 16px;
            }
            #controls {
                font-size: 12px;
            }
            #gameOver {
                padding: 30px;
                min-width: 250px;
            }
            #gameOver h1 {
                font-size: 36px;
            }
            #gameOver p {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div id="ui">
        <div id="stats">
            <div id="score">Score: 0</div>
            <div id="highScore">High Score: 0</div>
            <div id="multiplier">Multiplier: x1</div>
        </div>
        <div id="powerUpInfo"></div>
        <div id="gameOver">
            <h1>GAME OVER!</h1>
            <p id="finalScore">Final Score: 0</p>
            <p id="finalHighScore">High Score: 0</p>
            <button onclick="location.reload()">Play Again</button>
        </div>
        <div id="controls">
            <p>🎮 Desktop: Arrow Keys or A/D | Mobile: Tap left/right</p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // ===================== GAME CONFIGURATION =====================
        const CONFIG = {
            lanes: 3,
            laneWidth: 2,
            playerSpeed: 0.08,
            forwardSpeed: 0.2,
            camera: {
                distance: 8,
                height: 3,
                lookAhead: 10
            }
        };

        // ===================== SCENE SETUP =====================
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(
            75,
            window.innerWidth / window.innerHeight,
            0.1,
            1000
        );
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x87CEEB);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // ===================== LIGHTING =====================
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.6);
        directionalLight.position.set(5, 10, 5);
        directionalLight.castShadow = true;
        directionalLight.shadow.mapSize.width = 2048;
        directionalLight.shadow.mapSize.height = 2048;
        scene.add(directionalLight);

        // ===================== BACKGROUND/ENVIRONMENT =====================
        // Create sky gradient
        const canvas = document.createElement('canvas');
        canvas.width = 64;
        canvas.height = 64;
        const ctx = canvas.getContext('2d');
        const gradient = ctx.createLinearGradient(0, 0, 0, 64);
        gradient.addColorStop(0, '#87CEEB');
        gradient.addColorStop(1, '#E0F6FF');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, 64, 64);
        const skyTexture = new THREE.CanvasTexture(canvas);

        const skyGeometry = new THREE.SphereGeometry(500, 32, 32);
        const skyMaterial = new THREE.MeshBasicMaterial({
            map: skyTexture,
            side: THREE.BackSide
        });
        const sky = new THREE.Mesh(skyGeometry, skyMaterial);
        scene.add(sky);

        // ===================== PLAYER CLASS =====================
        class Player {
            constructor() {
                this.lane = 1; // Middle lane (0, 1, 2)
                this.position = new THREE.Vector3(0, 2, 0);
                this.speed = 0;
                this.mesh = this.createMesh();
                this.isAlive = true;
                this.hasShield = false;
                this.speedBoost = 1;
                this.magnetActive = false;
                this.smallSize = false;
                this.shieldTimer = 0;
                this.speedBoostTimer = 0;
                this.magnetTimer = 0;
                this.sizeTimer = 0;
                this.originalScale = new THREE.Vector3(1, 1, 1);

                scene.add(this.mesh);
            }

            createMesh() {
                const group = new THREE.Group();

                // Body (sphere)
                const bodyGeometry = new THREE.SphereGeometry(0.4, 32, 32);
                const bodyMaterial = new THREE.MeshStandardMaterial({ color: 0xFF6B9D });
                const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
                body.castShadow = true;
                body.receiveShadow = true;
                group.add(body);

                // Eyes
                const eyeGeometry = new THREE.SphereGeometry(0.15, 16, 16);
                const eyeMaterial = new THREE.MeshStandardMaterial({ color: 0xFFFFFF });
                const leftEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
                leftEye.position.set(-0.12, 0.1, 0.35);
                const rightEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
                rightEye.position.set(0.12, 0.1, 0.35);
                group.add(leftEye);
                group.add(rightEye);

                // Pupils
                const pupilGeometry = new THREE.SphereGeometry(0.07, 16, 16);
                const pupilMaterial = new THREE.MeshStandardMaterial({ color: 0x000000 });
                const leftPupil = new THREE.Mesh(pupilGeometry, pupilMaterial);
                leftPupil.position.set(-0.12, 0.1, 0.43);
                const rightPupil = new THREE.Mesh(pupilGeometry, pupilMaterial);
                rightPupil.position.set(0.12, 0.1, 0.43);
                group.add(leftPupil);
                group.add(rightPupil);

                group.position.copy(this.position);
                return group;
            }

            update(moveDir) {
                // Movement
                const targetLane = this.lane + moveDir;
                if (targetLane >= 0 && targetLane < CONFIG.lanes) {
                    this.lane = targetLane;
                }

                // Update position
                const laneOffset = (this.lane - 1) * CONFIG.laneWidth;
                this.position.x = laneOffset;
                this.position.z += CONFIG.forwardSpeed * this.speedBoost;

                this.mesh.position.copy(this.position);

                // Update timers
                if (this.hasShield) {
                    this.shieldTimer--;
                    if (this.shieldTimer <= 0) {
                        this.hasShield = false;
                        this.mesh.children.forEach(child => {
                            if (child.material && child.material.emissive) {
                                child.material.emissive.setHex(0x000000);
                            }
                        });
                    } else {
                        // Shield glow
                        this.mesh.children[0].material.emissive.setHex(0x4CAF50);
                    }
                }

                if (this.speedBoost > 1) {
                    this.speedBoostTimer--;
                    if (this.speedBoostTimer <= 0) {
                        this.speedBoost = 1;
                    }
                }

                if (this.magnetActive) {
                    this.magnetTimer--;
                    if (this.magnetTimer <= 0) {
                        this.magnetActive = false;
                    }
                }

                if (this.smallSize) {
                    this.sizeTimer--;
                    if (this.sizeTimer <= 0) {
                        this.smallSize = false;
                        this.mesh.scale.copy(this.originalScale);
                    }
                }
            }

            activateShield() {
                this.hasShield = true;
                this.shieldTimer = 300; // 5 seconds at 60fps
            }

            activateSpeedBoost() {
                this.speedBoost = 1.5;
                this.speedBoostTimer = 300;
            }

            activateMagnet() {
                this.magnetActive = true;
                this.magnetTimer = 300;
            }

            activateSmallSize() {
                this.smallSize = true;
                this.sizeTimer = 300;
                this.mesh.scale.multiplyScalar(0.7);
            }

            getCollisionRadius() {
                return this.smallSize ? 0.28 : 0.4;
            }
        }

        // ===================== OBSTACLE CLASS =====================
        class Obstacle {
            constructor(lane, zPosition) {
                this.lane = lane;
                this.laneOffset = (lane - 1) * CONFIG.laneWidth;
                this.position = new THREE.Vector3(this.laneOffset, 2, zPosition);
                this.type = Math.random() > 0.7 ? 'building' : 'cloud';
                this.mesh = this.createMesh();
                scene.add(this.mesh);
            }

            createMesh() {
                const group = new THREE.Group();
                group.position.copy(this.position);

                if (this.type === 'cloud') {
                    // Cloud obstacle
                    const cloudGeometry = new THREE.SphereGeometry(0.6, 32, 32);
                    const cloudMaterial = new THREE.MeshStandardMaterial({ color: 0xEEEEEE });
                    const cloud = new THREE.Mesh(cloudGeometry, cloudMaterial);
                    cloud.castShadow = true;
                    cloud.receiveShadow = true;
                    cloud.scale.set(1.5, 0.8, 1);
                    group.add(cloud);
                } else {
                    // Building obstacle
                    const buildingGeometry = new THREE.BoxGeometry(0.8, 1, 0.8);
                    const buildingMaterial = new THREE.MeshStandardMaterial({ color: 0xFF8C00 });
                    const building = new THREE.Mesh(buildingGeometry, buildingMaterial);
                    building.castShadow = true;
                    building.receiveShadow = true;
                    group.add(building);
                }

                return group;
            }

            update() {
                this.position.z -= CONFIG.forwardSpeed;
                this.mesh.position.z = this.position.z;
            }

            isOffScreen() {
                return this.position.z < player.position.z - 20;
            }
        }

        // ===================== ENEMY CLASS =====================
        class Enemy {
            constructor(lane, zPosition) {
                this.lane = lane;
                this.laneOffset = (lane - 1) * CONFIG.laneWidth;
                this.position = new THREE.Vector3(this.laneOffset, 2, zPosition);
                this.velocity = new THREE.Vector3(0, 0, 0);
                this.mesh = this.createMesh();
                this.health = 2;
                scene.add(this.mesh);
            }

            createMesh() {
                const group = new THREE.Group();
                group.position.copy(this.position);

                // Enemy body (triangle/pyramid shape)
                const geometry = new THREE.ConeGeometry(0.5, 1, 8);
                const material = new THREE.MeshStandardMaterial({ color: 0xFF3333 });
                const mesh = new THREE.Mesh(geometry, material);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                mesh.rotation.x = Math.PI / 2;
                group.add(mesh);

                // Eye
                const eyeGeometry = new THREE.SphereGeometry(0.15, 16, 16);
                const eyeMaterial = new THREE.MeshStandardMaterial({ color: 0xFFFF00 });
                const eye = new THREE.Mesh(eyeGeometry, eyeMaterial);
                eye.position.set(0, 0, 0.4);
                group.add(eye);

                return group;
            }

            update() {
                // Simple AI: follow player with some randomness
                const direction = new THREE.Vector3(
                    Math.sin(Date.now() * 0.001) * 0.3,
                    0,
                    -0.15
                );

                this.velocity.add(direction);
                this.velocity.multiplyScalar(0.95); // Damping

                this.position.add(this.velocity);
                this.position.x = Math.max(-2, Math.min(2, this.position.x));

                this.mesh.position.copy(this.position);
            }

            isOffScreen() {
                return this.position.z < player.position.z - 20;
            }
        }

        // ===================== POWERUP CLASS =====================
        class PowerUp {
            constructor(lane, zPosition) {
                this.lane = lane;
                this.laneOffset = (lane - 1) * CONFIG.laneWidth;
                this.position = new THREE.Vector3(this.laneOffset, 2, zPosition);
                this.type = this.chooseType();
                this.mesh = this.createMesh();
                this.rotation = 0;
                scene.add(this.mesh);
            }

            chooseType() {
                const types = ['shield', 'speedBoost', 'magnet', 'smallSize'];
                return types[Math.floor(Math.random() * types.length)];
            }

            createMesh() {
                const group = new THREE.Group();
                group.position.copy(this.position);

                let geometry, color;
                if (this.type === 'shield') {
                    geometry = new THREE.OctahedronGeometry(0.5);
                    color = 0x4CAF50;
                } else if (this.type === 'speedBoost') {
                    geometry = new THREE.ConeGeometry(0.4, 0.8, 8);
                    color = 0xFFD700;
                } else if (this.type === 'magnet') {
                    geometry = new THREE.BoxGeometry(0.3, 0.8, 0.3);
                    color = 0xFF00FF;
                } else {
                    geometry = new THREE.SphereGeometry(0.3, 16, 16);
                    color = 0x00FFFF;
                }

                const material = new THREE.MeshStandardMaterial({ color: color, emissive: color, emissiveIntensity: 0.5 });
                const mesh = new THREE.Mesh(geometry, material);
                mesh.castShadow = true;
                group.add(mesh);

                return group;
            }

            update() {
                this.position.z -= CONFIG.forwardSpeed;
                this.mesh.position.z = this.position.z;
                this.rotation += 0.05;
                this.mesh.rotation.y = this.rotation;
            }

            isOffScreen() {
                return this.position.z < player.position.z - 20;
            }
        }

        // ===================== GAME MANAGER =====================
        class GameManager {
            constructor() {
                this.score = 0;
                this.highScore = parseInt(localStorage.getItem('skyRunnerHighScore')) || 0;
                this.multiplier = 1;
                this.gameActive = true;
                this.obstacles = [];
                this.enemies = [];
                this.powerUps = [];
                this.spawnTimer = 0;
                this.enemySpawnTimer = 0;
                this.powerUpSpawnTimer = 0;
            }

            spawn() {
                this.spawnTimer++;
                this.enemySpawnTimer++;
                this.powerUpSpawnTimer++;

                // Spawn obstacles every 60 frames
                if (this.spawnTimer > 50) {
                    const lane = Math.floor(Math.random() * CONFIG.lanes);
                    this.obstacles.push(new Obstacle(lane, player.position.z + 30));
                    this.spawnTimer = 0;
                }

                // Spawn enemies every 120 frames
                if (this.enemySpawnTimer > 120) {
                    const lane = Math.floor(Math.random() * CONFIG.lanes);
                    this.enemies.push(new Enemy(lane, player.position.z + 25));
                    this.enemySpawnTimer = 0;
                }

                // Spawn power-ups every 180 frames
                if (this.powerUpSpawnTimer > 150) {
                    const lane = Math.floor(Math.random() * CONFIG.lanes);
                    this.powerUps.push(new PowerUp(lane, player.position.z + 20));
                    this.powerUpSpawnTimer = 0;
                }
            }

            update() {
                this.obstacles.forEach((obs, index) => {
                    obs.update();
                    if (obs.isOffScreen()) {
                        scene.remove(obs.mesh);
                        this.obstacles.splice(index, 1);
                    }
                });

                this.enemies.forEach((enemy, index) => {
                    enemy.update();
                    if (enemy.isOffScreen()) {
                        scene.remove(enemy.mesh);
                        this.enemies.splice(index, 1);
                    }
                });

                this.powerUps.forEach((powerUp, index) => {
                    powerUp.update();
                    if (powerUp.isOffScreen()) {
                        scene.remove(powerUp.mesh);
                        this.powerUps.splice(index, 1);
                    }
                });

                this.spawn();
                this.updateScore();
                this.checkCollisions();
            }

            checkCollisions() {
                if (!player.isAlive) return;

                const playerRadius = player.getCollisionRadius();

                // Check obstacle collisions
                this.obstacles.forEach(obs => {
                    const dist = player.position.distanceTo(obs.position);
                    if (dist < playerRadius + 0.5) {
                        if (player.hasShield) {
                            player.hasShield = false;
                            player.shieldTimer = 0;
                        } else {
                            this.endGame();
                        }
                    }
                });

                // Check enemy collisions
                this.enemies.forEach(enemy => {
                    const dist = player.position.distanceTo(enemy.position);
                    if (dist < playerRadius + 0.5) {
                        if (player.hasShield) {
                            player.hasShield = false;
                            player.shieldTimer = 0;
                        } else {
                            this.endGame();
                        }
                    }
                });

                // Check power-up collisions
                this.powerUps.forEach((powerUp, index) => {
                    const dist = player.position.distanceTo(powerUp.position);
                    const magnetRange = player.magnetActive ? 3 : 0.8;
                    if (dist < playerRadius + 0.3 || (player.magnetActive && dist < magnetRange)) {
                        this.collectPowerUp(powerUp);
                        scene.remove(powerUp.mesh);
                        this.powerUps.splice(index, 1);
                    }
                });
            }

            collectPowerUp(powerUp) {
                switch(powerUp.type) {
                    case 'shield':
                        player.activateShield();
                        this.multiplier = 1.2;
                        break;
                    case 'speedBoost':
                        player.activateSpeedBoost();
                        this.multiplier = 1.3;
                        break;
                    case 'magnet':
                        player.activateMagnet();
                        this.multiplier = 1.1;
                        break;
                    case 'smallSize':
                        player.activateSmallSize();
                        this.multiplier = 1.15;
                        break;
                }

                this.score += Math.round(50 * this.multiplier);
            }

            updateScore() {
                this.score += Math.round(0.1 * this.multiplier);
                if (this.multiplier > 1) {
                    this.multiplier *= 0.98; // Gradually decrease multiplier
                }
            }

            endGame() {
                player.isAlive = false;
                this.gameActive = false;

                if (this.score > this.highScore) {
                    this.highScore = this.score;
                    localStorage.setItem('skyRunnerHighScore', this.highScore);
                }

                document.getElementById('gameOver').style.display = 'block';
                document.getElementById('finalScore').textContent = `Final Score: ${Math.floor(this.score)}`;
                document.getElementById('finalHighScore').textContent = `High Score: ${this.highScore}`;
            }
        }

        // ===================== INPUT HANDLER =====================
        class InputHandler {
            constructor() {
                this.moveDirection = 0;
                this.isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

                if (this.isMobile) {
                    window.addEventListener('touchstart', (e) => this.handleTouch(e));
                } else {
                    window.addEventListener('keydown', (e) => this.handleKeyDown(e));
                    window.addEventListener('keyup', (e) => this.handleKeyUp(e));
                }
            }

            handleTouch(e) {
                const touches = e.touches;
                for (let touch of touches) {
                    if (touch.clientX < window.innerWidth / 2) {
                        game.moveDirection = -1;
                    } else {
                        game.moveDirection = 1;
                    }
                }

                setTimeout(() => {
                    game.moveDirection = 0;
                }, 100);
            }

            handleKeyDown(e) {
                if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
                    game.moveDirection = -1;
                } else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
                    game.moveDirection = 1;
                }
            }

            handleKeyUp(e) {
                if (['ArrowLeft', 'ArrowRight', 'a', 'A', 'd', 'D'].includes(e.key)) {
                    game.moveDirection = 0;
                }
            }
        }

        // ===================== INITIALIZATION =====================
        const player = new Player();
        const game = new GameManager();
        const input = new InputHandler();

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ===================== UPDATE UI =====================
        function updateUI() {
            document.getElementById('score').textContent = `Score: ${Math.floor(game.score)}`;
            document.getElementById('highScore').textContent = `High Score: ${game.highScore}`;
            document.getElementById('multiplier').textContent = `Multiplier: x${game.multiplier.toFixed(2)}`;

            let powerUpText = '';
            if (player.hasShield) {
                powerUpText += `🛡️ Shield: ${Math.ceil(player.shieldTimer / 60)}s\n`;
            }
            if (player.speedBoost > 1) {
                powerUpText += `⚡ Speed: ${Math.ceil(player.speedBoostTimer / 60)}s\n`;
            }
            if (player.magnetActive) {
                powerUpText += `🧲 Magnet: ${Math.ceil(player.magnetTimer / 60)}s\n`;
            }
            if (player.smallSize) {
                powerUpText += `📦 Small: ${Math.ceil(player.sizeTimer / 60)}s`;
            }

            document.getElementById('powerUpInfo').innerHTML = powerUpText.replace(/\n/g, '<br>');
        }

        // ===================== MAIN LOOP =====================
        function animate() {
            requestAnimationFrame(animate);

            if (game.gameActive) {
                player.update(game.moveDirection);
                game.update();

                // Update camera
                const targetCameraPos = new THREE.Vector3(
                    player.position.x,
                    player.position.y + CONFIG.camera.height,
                    player.position.z - CONFIG.camera.distance
                );
                camera.position.lerp(targetCameraPos, 0.1);
                camera.lookAt(player.position.x, player.position.y, player.position.z + CONFIG.camera.lookAhead);

                // Rotate sky with camera
                sky.rotation.copy(camera.rotation);
            }

            updateUI();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
